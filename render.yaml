services:
  - type: web
    name: ai-recruiting-assistant
    runtime: node
    repo: https://github.com/michaelsongyunkun/ai-recruiting-assistant.git
    branch: main
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: CREDENTIAL_ENCRYPTION_KEY
        generateValue: true
      - key: ALLOW_PLATFORM_AI_FALLBACK
        value: "false"
